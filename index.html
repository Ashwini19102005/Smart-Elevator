<!DOCTYPE html>
<html>
<head>

<title>Smart Elevator Digital Twin</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

</head>

<body>

<div class="header">
SMART ELEVATOR DIGITAL TWIN INDUSTRY DASHBOARD
</div>

<div class="dashboard">

<!-- CAMERA -->
<div class="cameraPanel card">
<video id="video" autoplay></video>
<canvas id="canvas"></canvas>
</div>

<!-- STATUS -->
<div class="card">
<h3 id="people">People: 0</h3>
<h4 id="wait">Estimated Wait: 0 sec</h4>
<h4 id="mode">Energy Mode: NORMAL</h4>
<button onclick="toggleMode()">AUTO / MANUAL</button>
</div>

<!-- PERFORMANCE -->
<div class="card">
<h3>Performance</h3>
<p id="energySave">Energy Saved: 0%</p>
<p id="efficiency">Efficiency: 92%</p>

<h4>Crowd Load</h4>

<div class="loadContainer">
<div id="loadBar" class="loadBar"></div>
</div>
</div>

<!-- LIFTS -->
<div class="card">

<h3>Elevators</h3>

<div class="lifts">

<div class="lift">
<div class="liftId">E1</div>
<div class="floorIndicator">F1</div>
<div class="liftStatus">STANDBY</div>
</div>

<div class="lift">
<div class="liftId">E2</div>
<div class="floorIndicator">F1</div>
<div class="liftStatus">STANDBY</div>
</div>

<div class="lift">
<div class="liftId">E3</div>
<div class="floorIndicator">F1</div>
<div class="liftStatus">STANDBY</div>
</div>

<div class="lift">
<div class="liftId">E4</div>
<div class="floorIndicator">F1</div>
<div class="liftStatus">STANDBY</div>
</div>

</div>

</div>

<!-- LOGS -->
<div class="card">
<h3>System Logs</h3>
<div id="logs" class="logBox"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
